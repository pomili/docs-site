<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- body -->
  <ellipse cx="50" cy="60" rx="30" ry="28" fill="#F5C842" stroke="#E0A800" stroke-width="2"/>
  <!-- head -->
  <circle cx="50" cy="35" r="22" fill="#F5C842" stroke="#E0A800" stroke-width="2"/>
  <!-- eyes -->
  <circle cx="42" cy="32" r="4" fill="#2D2D2D"/>
  <circle cx="43" cy="30" r="1.5" fill="#fff"/>
  <circle cx="58" cy="32" r="4" fill="#2D2D2D"/>
  <circle cx="59" cy="30" r="1.5" fill="#fff"/>
  <!-- beak -->
  <polygon points="50,38 45,42 55,42" fill="#FF8C00"/>
  <!-- blush -->
  <ellipse cx="37" cy="40" rx="5" ry="3" fill="#FFB3B3" opacity="0.6"/>
  <ellipse cx="63" cy="40" rx="5" ry="3" fill="#FFB3B3" opacity="0.6"/>
  <!-- wing -->
  <ellipse cx="22" cy="58" rx="10" ry="14" fill="#E8B800" transform="rotate(15 22 58)"/>
  <ellipse cx="78" cy="58" rx="10" ry="14" fill="#E8B800" transform="rotate(-15 78 58)"/>
  <!-- feet -->
  <line x1="40" y1="86" x2="36" y2="96" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="86" x2="44" y2="96" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="86" x2="56" y2="96" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="86" x2="64" y2="96" stroke="#FF8C00" stroke-width="3" stroke-linecap="round"/>
</svg>
